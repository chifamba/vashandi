services:
  db:
    image: pgvector/pgvector:pg18-trixie
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U paperclip -d paperclip" ]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - /System/Volumes/Data/storage/postgres/vashandi:/var/lib/postgresql
      - ./scripts/db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  vashandi:
    build:
      context: ./vashandi
      dockerfile: Dockerfile
    command: [ "paperclipai", "run" ]
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://vashandi:vashandi_password@db:5432/paperclip?search_path=vashandi
      PORT: "3100"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:8080}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      # mTLS Configuration (Node.js sidecar)
      OPENBRAIN_MTLS_ENABLED: "true"
      OPENBRAIN_CA_CERT: "/home/step/certs/root_ca.crt"
      OPENBRAIN_CLIENT_CERT: "/certs/vashandi.crt"
      OPENBRAIN_CLIENT_KEY: "/certs/vashandi.key"
      OPENBRAIN_REST_URL: "https://openbrain:3101"
    volumes:
      - /System/Volumes/Data/storage/vashandi:/paperclip
      - vashandi-certs:/certs:ro
      - ca-data:/home/step:ro
    depends_on:
      db:
        condition: service_healthy
      vashandi-ca-sidecar:
        condition: service_started

  vashandi-ui:
    build:
      context: ./vashandi
      dockerfile: ui/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - vashandi

  openbrain:
    build:
      context: ./openbrain
      dockerfile: Dockerfile
    command: [ "openbrain" ]
    ports:
      - "3101:3101"
      - "50051:50051"
    environment:
      DATABASE_URL: "postgres://openbrain:openbrain_password@db:5432/paperclip?search_path=openbrain&sslmode=disable"
      PORT: "3101"
      GRPC_PORT: "50051"
      REDIS_URL: redis://redis:6379
      OPENBRAIN_API_KEY: "${OPENBRAIN_API_KEY:-dev_secret_token}"
      # mTLS Configuration (Native ACME)
      MTLS_ENABLED: "true"
      MTLS_ENFORCED: "false" # Permissive mode for initial implementation
      STEP_CA_URL: "https://ca:9000"
      STEP_CA_FINGERPRINT: "${STEP_CA_FINGERPRINT}"
      DNS_NAME: "openbrain"
    volumes:
      - ca-data:/home/step:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      ca:
        condition: service_healthy

  ca:
    image: smallstep/step-ca
    command: >
      sh -c "if [ ! -f /home/step/config/ca.json ]; then
               echo \"$$DOCKER_STEPCA_INIT_PASSWORD\" > /tmp/password &&
               /usr/local/bin/step ca init --name \"Vashandi Internal CA\" --dns ca,localhost,127.0.0.1 --address :9000 --provisioner admin@vashandi.local --password-file /tmp/password --provisioner-password-file /tmp/password --acme &&
               mkdir -p /home/step/secrets && mv /tmp/password /home/step/secrets/password;
             fi;
             chmod a+rx /home/step/certs && chmod a+r /home/step/certs/root_ca.crt;
             exec /usr/local/bin/step-ca /home/step/config/ca.json --password-file /home/step/secrets/password"
    ports:
      - "9000:9000"
    environment:
      DOCKER_STEPCA_INIT_PASSWORD: "${STEP_CA_PASSWORD:-dev_password}"
    volumes:
      - ca-data:/home/step
    healthcheck:
      test: [ "CMD", "step", "ca", "health", "--ca-url", "https://localhost:9000", "--root", "/home/step/certs/root_ca.crt" ]
      interval: 5s
      timeout: 5s
      retries: 5

  vashandi-ca-sidecar:
    image: smallstep/step-cli
    user: root
    command: >
      sh -c "step ca bootstrap --ca-url https://ca:9000 --fingerprint $STEP_CA_FINGERPRINT --force &&
             echo ${STEP_CA_PASSWORD:-dev_password} > /tmp/pass &&
             while true; do
               step ca certificate vashandi-server /certs/vashandi.crt /certs/vashandi.key --provisioner admin@vashandi.local --provisioner-password-file /tmp/pass --san vashandi --san localhost --not-after 24h --force &&
               chmod 644 /certs/vashandi.crt /certs/vashandi.key &&
               sleep 12h;
             done"
    environment:
      STEPPATH: /tmp/step
      STEP_CA_FINGERPRINT: "${STEP_CA_FINGERPRINT}"
      STEP_CA_PASSWORD: "${STEP_CA_PASSWORD:-dev_password}"
    volumes:
      - vashandi-certs:/certs
      - ca-data:/home/step:ro
    depends_on:
      ca:
        condition: service_healthy

volumes:
  db-data:
  redis-data:
  vashandi-data:
  ca-data:
  vashandi-certs:
